name: 'terraform_state_artifact_gcs'
description: 'Sets up and runs Terraform, and creates an encrypted Terraform artifact'
author: 'Sturla Bragason'
inputs:
  upload:
    description: 'upload state file'
    required: false
    default: ''
  apply:
    description: 'terraform apply'
    required: false
    default: true
  destroy:
    description: 'terraform destroy'
    required: false
    default: false
  custom_plan_flags:
    description: 'Add custom flags to the terraform plan command'
    required: false
    default: ''
  custom_apply_flags:
    description: 'Add custom flags to the terraform apply command'
    required: false
    default: ''
  custom_destroy_flags:
    description: 'Add custom flags to the terraform apply -destroy command'
    required: false
    default: ''
  environment:
    description: 'Add environment'
    required: true
  terraformstatefile:
    description: 'Terraformstatefile name'
    required: true
  terraformuploadfile:
    description: 'Terraformuploadfile name'
    required: false
  bucket:
    description: 'Terraformuploadfile bucket'
    required: false
    default: 'github-terraform-artifacts'

runs:
  using: "composite"
  steps:
    - uses: hashicorp/setup-terraform@v4
    - id: terraform
      run: |
        $terraformupload = "${{ inputs.upload }}"
        if ($terraformupload -eq "true"){
          $terraformuploadfile = "${{ inputs.terraformuploadfile }}"
          Write-Host "Upload from = ./state/$terraformuploadfile"
          Copy-Item "./state/$terraformuploadfile" ./terraform.tfstate
          exit 0
        }

        $environment = "${{ inputs.environment }}"
        $terraformstatefile = "${{ inputs.terraformstatefile }}"
        $statefile = "terraform.tfstate"
        Write-Host "Use terraformstatefile = $terraformstatefile"
        $repo = "${{ github.repository }}"
        $bucketname = "${{ inputs.bucket }}"
        $zipname = "state.zip"

        Write-Host "Copying gs://${bucketname}/${repo}/${terraformstatefile} to ${zipname}"
        gcloud storage cp --verbosity=none --no-user-output-enabled "gs://${bucketname}/${repo}/${terraformstatefile}" "${zipname}"

        if (Test-Path $zipname) {
          # Decompress statefile
          Write-Host "Decompress ${zipname} to ${statefile}"
          Expand-Archive $zipname
          Copy-Item "./state/${statefile}" -Destination $statefile
        } else {
          Write-Host "No previous statefile found"
        }

        terraform init
        $path = "./environments/${{ inputs.environment }}/main.tfvars"
        Write-Host "Use tfvars file = $path for environment $environment"
        $terraformapply = "${{ inputs.apply }}"
        $terraformdestroy = "${{ inputs.destroy }}"
        $custom_plan_flags = "${{ inputs.custom_plan_flags }}"
        $custom_apply_flags = "${{ inputs.custom_apply_flags }}"
        $custom_destroy_flags = "${{ inputs.custom_destroy_flags }}"
        if ($terraformapply -eq "false"){
          $terraformapply = $false
        }
        if ($terraformdestroy -eq "false"){
          $terraformdestroy = $false
        }
        terraform plan -var-file="$path" $custom_plan_flags
        if ($terraformapply){
          terraform apply -auto-approve -var-file="$path" $custom_apply_flags

          $ExitCode = $LastExitCode

          if ($ExitCode -eq 1){
            exit 1
          }
        }
        if ($terraformdestroy){
          terraform apply -destroy -auto-approve -var-file="$path" $custom_destroy_flags

          $ExitCode = $LastExitCode

          if ($ExitCode -eq 1){
            exit 1
          }
        }

      shell: pwsh
    - name: Archive artifacts
      if: success() || failure()
      run: |
        $environment = "${{ inputs.environment }}"
        $terraformstatefile = "${{ inputs.terraformstatefile }}"
        $statefile = "terraform.tfstate"
        $repo = "${{ github.repository }}"
        $bucketname = "${{ inputs.bucket }}"
        $zipname = "state.zip"

        if (Test-Path $statefile) {
          if (Test-Path $zipname) {
            $date_str = "{0:s}" -f (get-date)
            Write-Host "Archive gs://${bucketname}/${repo}/${terraformstatefile} to gs://${bucketname}/${repo}/archive/${terraformstatefile}_${date_str}"
            gcloud storage cp --no-user-output-enabled "gs://${bucketname}/${repo}/${terraformstatefile}" "gs://${bucketname}/${repo}/archive/${terraformstatefile}_${date_str}"
          }

          # Compress statefile
          Write-Host "Compress ${statefile} to ${zipname}"
          Compress-Archive -Force -LiteralPath $statefile -CompressionLevel Optimal -DestinationPath $zipname

          Write-Host "Copying $zipname to gs://${bucketname}/${repo}/${terraformstatefile}"
          gcloud storage cp --no-user-output-enabled $zipname "gs://${bucketname}/${repo}/${terraformstatefile}"
        } else {
          Write-Host "No statefile to upload"
        }

      shell: pwsh

branding:
  icon: 'cloud'
  color: 'gray-dark'
